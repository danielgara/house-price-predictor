name: Streamlit CI

on:
  push:
    paths:
    - 'streamlit_app/**'
  workflow_dispatch:
    
jobs:      
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
        
    - name: docker login
      env:
        DOCKER_USER: ${{secrets.DOCKERHUB_USER}}
        DOCKER_PASS: ${{secrets.DOCKERHUB_PASS}}
      run: |
        docker login -u $DOCKER_USER -p $DOCKER_PASS
  
    - name: Build the Docker image
      run: docker build ./streamlit_app --tag danielgara/streamlit:latest

    - name: Docker Push
      run: docker push danielgara/streamlit
